set -g status on
set -g status-style bg=#1D1D20,fg=#C0BFBC

# Left and right status
set -g status-left-length 40
set -g status-right-length 120

# Session name
set -g status-left "#[fg=#62A0EA,bold] #S "

# Date / time / user
set -g status-right "#[fg=#7D8AC7] %Y-%m-%d #[fg=#33B2A4]%H:%M #[fg=#C061CB]#(whoami)"

# Window title styling
setw -g window-status-format "#[fg=#9A9996] #I:#W "

# Current window
setw -g window-status-current-format "#[fg=#3584E4,bold]#I:#W "

# Pane borders
set -g pane-border-style fg=#3D3D3D
set -g pane-active-border-style fg=#62A0EA

# Messages
set -g message-style bg=#242428,fg=#62A0EA

# Command prompt
set -g message-command-style bg=#242428,fg=#33D17A

# Mode styling (copy mode etc.)
set -g mode-style bg=#3584E4,fg=#FFFFFF

# Optional cleanup
set -g bell-action none
set -g display-time 3000

# Window separators
set -g window-status-separator ""
