set -g status on
set -g status-style bg=#101010,fg=#a0a0a0  # dark background, light text

# Left and right status
set -g status-left-length 40
set -g status-right-length 120
set -g status-left "#[fg=#e6b99d,bold] #S "       # session name in yellow
set -g status-right "#[fg=#aca1cf] %Y-%m-%d #[fg=#f5a191]%H:%M #[fg=#ea83a5]#(whoami)"  # date/time and user

# Window title styling
setw -g window-status-format "#[fg=#a0a0a0] #I:#W "
setw -g window-status-current-format "#[fg=#f5a191,bold]#I:#W "  # highlight current window in red-ish

# Pane border styling
set -g pane-border-style fg=#7e7e7e
set -g pane-active-border-style fg=#f5a191

# Message styling
set -g message-style bg=#101010,fg=#f5a191

# Optional: remove indicators that are ugly
set -g bell-action none
set -g display-time 3000
